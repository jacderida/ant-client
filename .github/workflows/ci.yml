name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"
  RUST_LOG: "off"

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --all-targets --all-features -- -D warnings

  test-unit:
    name: Unit Tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run unit tests
        run: cargo test --lib --all
      - name: Run self-encryption unit tests
        run: cargo test -p ant-core --test unit_self_encrypt
      - name: Run merkle unit tests
        run: cargo test -p ant-core --test merkle_unit
      - name: Run node management integration tests
        run: cargo test -p ant-core --test daemon_integration --test node_add_integration -- --test-threads=1

  test-e2e:
    name: E2E Tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: nightly
      - name: Run E2E tests (serial)
        run: cargo test -p ant-core --test e2e_chunk --test e2e_data --test e2e_file --test e2e_payment --test e2e_security --test e2e_cost_estimate -- --test-threads=1

  test-merkle:
    name: Merkle E2E (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    # Ubuntu runner is consistently slower than macOS for the 35-node
    # merkle testnet (each of the 4 tests spins up a fresh testnet,
    # ~5 min each on Ubuntu vs ~3 min on macOS). The previous 20-min
    # cap was hitting timeout on Ubuntu before the 4th test could run
    # (also affecting main — see runs prior to 2026-04-30). 40 min
    # gives headroom while still being a safety bound.
    timeout-minutes: 40
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: nightly
      - name: Run merkle E2E tests (35-node testnet)
        run: cargo test -p ant-core --test e2e_merkle -- --test-threads=1
        env:
          RUST_LOG: "warn"

  doc:
    name: Documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build documentation
        run: cargo doc --all-features --no-deps
        env:
          RUSTDOCFLAGS: "-D warnings"

  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build release
        run: cargo build --release

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-audit
        run: cargo install cargo-audit
      - name: Run security audit
        run: >-
          cargo audit
          --ignore RUSTSEC-2023-0089
          --ignore RUSTSEC-2024-0388
          --ignore RUSTSEC-2024-0436
          --ignore RUSTSEC-2025-0134
          --ignore RUSTSEC-2025-0141
          --ignore RUSTSEC-2026-0012
          --ignore RUSTSEC-2026-0044
          --ignore RUSTSEC-2026-0045
          --ignore RUSTSEC-2026-0046
          --ignore RUSTSEC-2026-0047
          --ignore RUSTSEC-2026-0048
          --ignore RUSTSEC-2026-0049
          --ignore RUSTSEC-2026-0067
          --ignore RUSTSEC-2026-0068
