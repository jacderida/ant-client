[workspace]
members = ["ant-core", "ant-cli"]
resolver = "2"

# Testnet build: ADR-011 authenticated leased relay-port reservations.
# ant-client has no direct saorsa deps (it goes through ant-protocol re-exports),
# but [patch.crates-io] overrides the whole transitive graph — so all three forks
# are pinned. The saorsa-core fork is what carries the client-side dial-failure
# cache self-heal (must be in the `ant` binary, per the V2-463 dep-skew lesson).
[patch.crates-io]
saorsa-transport = { git = "https://github.com/jacderida/saorsa-transport.git", rev = "9da15c80bae6eb2e52d20ff4f3e0e2e89fe4eb83" }  # branch: feat-consistent_relay_port
saorsa-core = { git = "https://github.com/jacderida/saorsa-core.git", rev = "3cf7e872877e4503662f9a5696bf76e42afbde31" }  # branch: feat-consistent_relay_port
ant-protocol = { git = "https://github.com/jacderida/ant-protocol.git", rev = "1e8fa4d677aa63ba623802c1c0e2ebff2d3dcf70" }  # branch: feat-consistent_relay_port
